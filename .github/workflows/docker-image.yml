name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env File
        run: |
          cat > .env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          POSTGRES_NAME=${{ secrets.POSTGRES_NAME }}
          USER=${{ secrets.USER }}
          PASSWORD=${{ secrets.PASSWORD }}
          HOST=${{ secrets.HOST }}
          PORT=${{ secrets.PORT }}
          SPRING_URI_SCHEDULE=${{ secrets.SPRING_URI_SCHEDULE }}
          SPRING_URI_CANCEL=${{ secrets.SPRING_URI_CANCEL }}

          MONGO_HOST=${{ secrets.MONGO_HOST }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          MONGO_ROOT_USER=${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DB=${{ secrets.MONGO_DB }}
          MONGO_COLLECTION=${{ secrets.MONGO_COLLECTION }}
          NAME_CLOUDINARY_DB=${{ secrets.NAME_CLOUDINARY_DB }}
          API_KEY_CLOUDINARY=${{ secrets.API_KEY_CLOUDINARY }}
          API_SECRET_CLOUDINARY=${{ secrets.API_SECRET_CLOUDINARY }}
          
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push with Compose
        run: |
          docker compose build
          docker compose push

      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DJANGO_DEPLOY_HOOK }}
          curl -X POST ${{ secrets.RENDER_SPRING_DEPLOY_HOOK }}
