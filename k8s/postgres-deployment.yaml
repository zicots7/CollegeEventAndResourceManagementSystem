apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: college-events-and-resources-manager-namespace
  labels:
    app: postgres
spec:
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: 'postgres:18.3-alpine3.23'
          ports:
            - containerPort: 5432
          env:
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: POSTGRES_NAME
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: POSTGRES_PASSWORD
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: HOST
 
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: college-events-and-resources-manager-namespace
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432