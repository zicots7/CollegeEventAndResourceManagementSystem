apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: college-events-and-resources-manager-namespace
  labels:
    app: mongodb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:8.0
          ports:
            - containerPort: 27017
          env:
          - name: MONGO_HOST
            value: mongodb-service
          - name: MONGO_ROOT_USER
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: MONGO_ROOT_USER
          - name: MONGO_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: MONGO_ROOT_PASSWORD
          - name: MONGO_DB
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: MONGO_DB
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: college-events-and-resources-manager-namespace
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017