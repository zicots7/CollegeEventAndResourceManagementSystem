{% extends 'Base.html' %}
{% block title %}
<title>Update Resource</title>
{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">

      <a href="{% url 'resourceList' %}" class="btn btn-outline-secondary btn-sm mb-3">
        ← Back to List
      </a>

      <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-primary text-white py-3 px-4 rounded-top-4">
          <h5 class="mb-0 fw-bold">Edit Resource: {{ form.instance.title }}</h5>
        </div>

        <div class="card-body p-4">
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="card p-4 mb-4 bg-light border-0">
              <h4 class="mb-3">General Information</h4>
              {{ form.as_p }}

              <div class="mt-3">
                <label class="form-label fw-bold text-primary">Current File</label>
                <div class="d-flex align-items-center">
                  <a href="{{ resource_instance.file_url }}" target="_blank" class="btn btn-sm btn-outline-info me-2">
                    <i class="bi bi-eye"></i> View Current File
                  </a>
                  <span class="text-muted small">(Upload new to replace)</span>
                </div>
              </div>
            </div>

            <div class="card p-4 mb-4 border-1" id="dynamic-fields-container" style="display:none;">
              <h4 id="dynamic-title" class="text-primary">Specific Details</h4>
              <hr>

              <div class="extra-fields" id="fields-Notes" style="display:none;">
                <div class="mb-3">
                  <label class="form-label">Professor Name</label>
                  <input type="text" name="professor" value="{{ details.professor|default:'' }}" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Format (Handwritten/Typed)</label>
                  <input type="text" name="format" value="{{ details.format|default:'' }}" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Topic Coverage</label>
                  <textarea name="topic_coverage" class="form-control" rows="3">{{ details.topic_coverage|default:'' }}</textarea>
                </div>
              </div>

              <div class="extra-fields" id="fields-Assignment" style="display:none;">
                <div class="mb-3">
                  <label class="form-label">Deadline</label>
                  <input type="date" name="deadline" value="{{ details.deadline|default:'' }}" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Total Marks</label>
                  <input type="number" name="total_marks" value="{{ details.total_marks|default:'' }}" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Lab Work?</label>
                  <select name="lab_work" class="form-control">
                    <option value="No" {% if details.lab_work == 'No' %}selected{% endif %}>No</option>
                    <option value="Yes" {% if details.lab_work == 'Yes' %}selected{% endif %}>Yes</option>
                  </select>
                </div>
              </div>

              <div class="extra-fields" id="fields-Syllabus" style="display:none;">
                <div class="mb-3">
                  <label class="form-label">Academic Year</label>
                  <input type="text" name="academic_year" value="{{ details.academic_year|default:'' }}" class="form-control" placeholder="2025-26">
                </div>
                <div class="mb-3">
                  <label class="form-label">Semester</label>
                  <input type="number" name="semester" value="{{ details.semester|default:'' }}" class="form-control">
                </div>
              </div>

              <div class="extra-fields" id="fields-Previous_paper" style="display:none;">
                <div class="mb-3">
                  <label class="form-label">Exam Year</label>
                  <input type="number" name="exam_year" value="{{ details.exam_year|default:'' }}" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Exam Type (Mid/End/Suppli)</label>
                  <input type="text" name="exam_type" value="{{ details.exam_type|default:'' }}" class="form-control">
                </div>
              </div>

              <div class="extra-fields" id="fields-Reference" style="display:none;">
                <div class="mb-3">
                  <label class="form-label">Author</label>
                  <input type="text" name="author" value="{{ details.author|default:'' }}" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">ISBN</label>
                  <input type="text" name="isbn" value="{{ details.isbn|default:'' }}" class="form-control">
                </div>
              </div>

              <div class="extra-fields" id="fields-Other" style="display:none;">
                <div class="mb-3">
                  <label class="form-label">Additional Details</label>
                  <textarea name="details" class="form-control" rows="4">{{ details.details|default:'' }}</textarea>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
              Update Resource
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Django typically renders the ID as 'id_category'
    const typeSelect = document.querySelector('#id_category');
    const container = document.querySelector('#dynamic-fields-container');
    const allExtraFields = document.querySelectorAll('.extra-fields');

    function toggleFields() {
        const selectedValue = typeSelect.value;

        if (!selectedValue) {
            container.style.display = 'none';
            return;
        }

        container.style.display = 'block';
        // Hide all first
        allExtraFields.forEach(div => div.style.display = 'none');

        // Show specific one
        const targetDiv = document.querySelector(`#fields-${selectedValue}`);
        if (targetDiv) {
            targetDiv.style.display = 'block';
            document.getElementById('dynamic-title').innerText = selectedValue.replace('_', ' ') + " Details";
        }
    }

    // Trigger on change
    typeSelect.addEventListener('change', toggleFields);

    // CRITICAL: Trigger on page load to show existing Mongo data
    toggleFields();
});
</script>
{% endblock %}
