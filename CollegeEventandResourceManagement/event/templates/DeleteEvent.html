{% extends 'Base.html' %}
{% block title %}
<title>Delete Event</title>
{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-danger text-white py-3 px-4 rounded-top-4">
          <h5 class="mb-0 fw-bold">Delete this Event </h5>
        </div>
        <div class="card-body p-4 text-center">
          <p class="fs-5">Are you sure you want to delete this event?</p>
          <p class="fw-bold fs-4">{{ event.title }} ?</p>
          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-danger flex-grow-1">Yes</button>
              <a href="{% url 'event_lists' %}" class="btn btn-outline-secondary flex-grow-1">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
